<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>癒しのお散歩</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ecfdf5">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23cbd5e1%22/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overscroll-behavior-y: none;
            background-color: #ecfdf5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            color: #94a3b8;
        }
        
        .grass-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 100 Q 25 80 30 100 M70 100 Q 75 70 80 100 M45 100 Q 50 85 55 100' stroke='%23d1fae5' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
            background-size: 150px 150px;
            animation: scrollBg 2.5s linear infinite;
        }
        .grass-bg.paused { animation-play-state: paused; }
        @keyframes scrollBg { from { background-position: 0 -150px; } to { background-position: 0 0; } }

        /* キャラクターの動き */
        @keyframes nyoki {
            0%   { transform: scale(1, 1) translateX(0); }
            30%  { transform: scale(1.15, 0.85) translateX(15px); }
            70%  { transform: scale(0.85, 1.15) translateX(5px); }
            100% { transform: scale(1, 1) translateX(0); }
        }
        @keyframes breathe { 0% { transform: scale(1); } 50% { transform: scale(1.02, 0.98) translateY(2px); } 100% { transform: scale(1); } }
        
        /* 左右にコロコロ転がるモーション */
        @keyframes rollLR {
            0% { transform: rotate(0deg) translateX(0); }
            25% { transform: rotate(15deg) translateX(10px); }
            50% { transform: rotate(0deg) translateX(0); }
            75% { transform: rotate(-15deg) translateX(-10px); }
            100% { transform: rotate(0deg) translateX(0); }
        }

        @keyframes yawn { 0% { transform: scale(1); } 50% { transform: scale(0.9, 1.1) translateY(-5px); } 100% { transform: scale(1); } }
        @keyframes floatSymbol { 0% { opacity: 0; transform: translateY(10px) scale(0.8); } 20% { opacity: 1; transform: translateY(-25px) scale(1.1); } 80% { opacity: 1; transform: translateY(-30px) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(0.8); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .anim-breathe { animation: breathe 4s ease-in-out infinite; }
        .anim-walk { animation: nyoki 0.8s ease-in-out infinite; }
        .anim-roll-lr { animation: rollLR 1.2s ease-in-out infinite; }
        .anim-yawn { animation: yawn 2s ease-in-out; }
        .anim-float { animation: floatSymbol 2.5s ease-in-out forwards; }
        .anim-pulse { animation: pulse 2s ease-in-out infinite; }

        .hidden { display: none !important; }
        
        .info-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 8px 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .action-btn {
            background: linear-gradient(135deg, #34d399, #10b981);
            color: white;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .action-btn.active-state {
            background: rgba(255, 255, 255, 0.8);
            color: #10b981;
            border: 2px solid #10b981;
            box-shadow: none;
        }
    </style>
</head>
<body class="grass-bg paused h-screen w-screen flex flex-col items-center justify-between overflow-hidden relative">

    <header class="w-full p-6 flex justify-between items-start z-10">
        <div class="info-panel">
            <span class="text-[10px] font-bold text-slate-400 mb-1">今日の歩数</span>
            <div class="flex items-center gap-2 text-slate-500">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="7" cy="11" r="2.5"/><circle cx="11" cy="7" r="2.5"/><circle cx="16" cy="8" r="2.5"/><circle cx="20" cy="12" r="2.5"/>
                    <path d="M14 19c-2.5 0-5-1.5-5-4.5s2-5.5 5-5.5 5 2.5 5 5.5-2.5 4.5-5 4.5z"/>
                </svg>
                <span id="steps-display" class="text-2xl font-bold tracking-tighter">0</span>
            </div>
        </div>

        <div class="flex flex-col items-end gap-2">
            <div class="info-panel">
                <span class="text-[10px] font-bold text-slate-400 mb-1">あつめたコイン</span>
                <div class="flex items-center gap-2 text-slate-500">
                    <svg class="w-5 h-5 text-yellow-400" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="#fbbf24" stroke-width="2" fill="#fde047"/><circle cx="12" cy="12" r="6" stroke="#fbbf24" stroke-width="1" fill="none"/><path d="M12 7v10" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/></svg>
                    <span id="coins-display" class="text-xl font-bold tracking-tighter">0</span>
                </div>
            </div>
            <div class="bg-white/50 px-3 py-1.5 rounded-full flex items-center gap-1 border border-slate-200 shadow-sm">
                <span class="text-[9px] font-bold text-slate-400">おみせ準備中...</span>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full flex justify-center items-center relative z-10">
        
        <div id="symbol-container" class="absolute top-[5%] left-0 right-0 flex justify-center pointer-events-none opacity-0 z-20">
            <svg id="sym-note" class="hidden w-16 h-16" viewBox="0 0 100 100" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"><path d="M 35 70 A 10 10 0 1 1 25 60 A 10 10 0 0 1 35 70 Z M 35 60 L 35 25 L 75 15 L 75 50" fill="#cbd5e1"/><path d="M 75 60 A 10 10 0 1 1 65 50 A 10 10 0 0 1 75 60 Z" fill="#cbd5e1"/><path d="M 35 40 L 75 30" /></svg>
            <svg id="sym-angry" class="hidden w-16 h-16" viewBox="0 0 100 100" fill="none" stroke="#fca5a5" stroke-width="8" stroke-linecap="round"><path d="M 20 40 L 40 50 L 20 60 M 80 40 L 60 50 L 80 60 M 40 20 L 50 40 L 60 20 M 40 80 L 50 60 L 60 80" /></svg>
            <svg id="sym-sweat" class="hidden w-16 h-16" viewBox="0 0 100 100" fill="#bae6fd" stroke="#7dd3fc" stroke-width="4"><path d="M 50 20 C 30 60 20 80 50 80 C 80 80 70 60 50 20 Z" /></svg>
            <svg id="sym-sparkle" class="hidden w-16 h-16" viewBox="0 0 100 100" fill="#fef08a" stroke="#fde047" stroke-width="4"><path d="M 50 10 Q 50 40 20 50 Q 50 60 50 90 Q 50 60 80 50 Q 50 40 50 10 Z" /></svg>
        </div>

        <!-- キャラクター本体 -->
        <div id="pet-container" class="anim-breathe origin-center mt-8">
            <svg width="300" height="200" viewBox="0 0 300 200">
                <defs>
                    <filter id="fluffy">
                        <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
                    </filter>
                </defs>
                <!-- 本体：グレー -->
                <ellipse cx="150" cy="110" rx="95" ry="85" fill="#cbd5e1" filter="url(#fluffy)" />
                <!-- おなか：白色の毛並み -->
                <ellipse cx="150" cy="130" rx="70" ry="55" fill="#ffffff" filter="url(#fluffy)" opacity="0.9" />
                
                <g id="face-normal" class="face hidden"><circle cx="105" cy="125" r="5.5" fill="#475569" /><circle cx="195" cy="125" r="5.5" fill="#475569" /></g>
                <g id="face-sleep" class="face hidden"><path d="M 95 125 Q 105 120 115 125" stroke="#475569" stroke-width="4.5" stroke-linecap="round" fill="none" /><path d="M 185 125 Q 195 120 205 125" stroke="#475569" stroke-width="4.5" stroke-linecap="round" fill="none" /></g>
                <g id="face-happy" class="face hidden"><path d="M 95 125 Q 105 115 115 125" stroke="#475569" stroke-width="4.5" stroke-linecap="round" fill="none" /><path d="M 185 125 Q 195 115 205 125" stroke="#475569" stroke-width="4.5" stroke-linecap="round" fill="none" /></g>
                <g id="face-squint" class="face hidden"><line x1="100" y1="125" x2="110" y2="125" stroke="#475569" stroke-width="4.5" stroke-linecap="round" /><line x1="190" y1="125" x2="200" y2="125" stroke="#475569" stroke-width="4.5" stroke-linecap="round" /></g>
                <g id="face-surprised" class="face hidden"><circle cx="105" cy="125" r="3" fill="#475569" /><circle cx="195" cy="125" r="3" fill="#475569" /></g>
            </svg>
        </div>
    </main>

    <footer class="w-full p-8 flex flex-col justify-center items-center z-10 pb-12">
        <button id="btn-action" class="action-btn anim-pulse px-8 py-5 rounded-full font-bold text-lg flex flex-col items-center justify-center gap-1 w-[85%] max-w-[300px]">
            <span>しゅっぱつ！</span>
            <span class="text-[10px] font-normal opacity-90">スマホを持って歩こう</span>
        </button>
    </footer>

    <script>
        const todayStr = new Date().toDateString();
        let savedDate = localStorage.getItem('petDate');
        let steps = parseInt(localStorage.getItem('petStepsNum')) || 0;
        let coins = parseInt(localStorage.getItem('petCoinsNum')) || 0;

        if (savedDate !== todayStr) {
            steps = 0;
            localStorage.setItem('petDate', todayStr);
        }
        
        const ui = {
            body: document.body,
            steps: document.getElementById('steps-display'),
            coins: document.getElementById('coins-display'),
            pet: document.getElementById('pet-container'),
            symbolContainer: document.getElementById('symbol-container'),
            symbols: document.querySelectorAll('#symbol-container svg'),
            btn: document.getElementById('btn-action'),
            faces: document.querySelectorAll('.face')
        };

        let lastMoveTime = Date.now();
        let isWalking = false;

        function updateData() {
            ui.steps.innerText = steps;
            ui.coins.innerText = coins;
            localStorage.setItem('petStepsNum', steps);
            localStorage.setItem('petCoinsNum', coins);
        }

        function setEmotion(faceId, animClass, symbolId = null) {
            ui.faces.forEach(f => f.classList.add('hidden'));
            const faceEl = document.getElementById(`face-${faceId}`);
            if (faceEl) faceEl.classList.remove('hidden');

            ui.pet.className = 'origin-center mt-8';
            if (animClass) ui.pet.classList.add(animClass);
            
            ui.body.classList.toggle('paused', !(animClass === 'anim-walk' || animClass === 'anim-roll-lr'));

            if (symbolId) {
                ui.symbols.forEach(s => s.classList.add('hidden'));
                const symEl = document.getElementById(`sym-${symbolId}`);
                if (symEl) {
                    symEl.classList.remove('hidden');
                    ui.symbolContainer.classList.remove('anim-symbol');
                    void ui.symbolContainer.offsetWidth; 
                    ui.symbolContainer.classList.add('anim-symbol');
                }
            }
        }

        function checkBaseState() {
            const hour = new Date().getHours();
            const idleTime = Date.now() - lastMoveTime;
            if (hour >= 23 || hour < 6) {
                if (idleTime > 5000) setEmotion('sleep', 'anim-breathe');
            } else {
                if (idleTime > 30000) setEmotion('sleep', 'anim-yawn', 'note');
                else if (idleTime > 10000) setEmotion('squint', 'anim-breathe');
                else if (idleTime > 2000) setEmotion('normal', 'anim-breathe');
            }
        }
        setInterval(checkBaseState, 1000);

        function triggerMove() {
            lastMoveTime = Date.now();
            steps++;
            if (steps % 100 === 0) {
                coins++;
                setEmotion('happy', 'anim-roll-lr', 'sparkle'); // コイン獲得時はコロコロ転がって喜ぶ
                setTimeout(updateData, 100);
                return;
            }
            updateData();
            
            // 普段の移動
            if (steps % 10 === 0) setEmotion('normal', 'anim-walk');
        }

        ui.pet.addEventListener('click', () => {
            lastMoveTime = Date.now();
            const reactions = [
                {f: 'happy', a: 'anim-roll-lr', s: 'sparkle'}, // タップでコロコロ転がる
                {f: 'happy', a: 'anim-breathe', s: 'note'},
                {f: 'surprised', a: 'anim-yawn', s: null}
            ];
            const r = reactions[Math.floor(Math.random() * reactions.length)];
            setEmotion(r.f, r.a, r.s);
        });

        ui.btn.addEventListener('click', () => {
            if (!isWalking) {
                ui.btn.classList.add('active-state');
                ui.btn.innerHTML = `<span>おさんぽ中...</span>`;
                isWalking = true;
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(s => {
                        if (s === 'granted') window.addEventListener('devicemotion', handleMotion);
                    });
                } else {
                    window.addEventListener('devicemotion', handleMotion);
                }
            }
            triggerMove(); 
        });

        let lastX, lastY, lastZ;
        function handleMotion(e) {
            let acc = e.accelerationIncludingGravity;
            if (!acc) return;
            if (lastX !== undefined) {
                if (Math.abs(lastX - acc.x) > 6 || Math.abs(lastY - acc.y) > 6 || Math.abs(lastZ - acc.z) > 6) triggerMove();
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        updateData();
        checkBaseState();
    </script>
</body>
</html>
