<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>もふもふ育成</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#ddd8d0;}
body{display:flex;justify-content:center;align-items:center;}

#dev{position:relative;width:380px;height:414px;}

/* Device image as BACKGROUND (z-index 1) */
#dev-img{
  width:100%;height:100%;object-fit:contain;
  position:absolute;top:0;left:0;z-index:1;
  pointer-events:none;
}

/* ===== GAME SCREEN on top (z-index 5) ===== */
/* Exact position: left=31.2% top=35.5% w=41.5% h=36.3% */
#sa{
  position:absolute;
  left:31.2%;top:35.5%;
  width:41.5%;height:36.3%;
  z-index:5;
  border-radius:3px;overflow:hidden;
  display:flex;flex-direction:column;
}

.ib{
  height:20px;flex-shrink:0;
  background:linear-gradient(180deg,#FFF8DC,#FFEEB4);
  display:flex;justify-content:space-around;align-items:center;
  padding:0 2px;
}
.ic{
  width:32px;height:16px;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:.3;transition:opacity .1s;
}
.ic:active{transform:scale(.9);}
.ic.sel{opacity:1;}
.ic svg.bg{position:absolute;width:100%;height:100%;top:0;left:0;}
.ic .il{position:relative;z-index:2;font-size:9px;}
.ic .dot{position:absolute;width:3px;height:3px;border-radius:50%;background:#e05090;display:none;z-index:3;}
.ic.sel .dot{display:block;}
.ic.top .dot{bottom:0;left:50%;transform:translateX(-50%);}
.ic.bot .dot{top:0;left:50%;transform:translateX(-50%);}

/* Pink/blue checker screen */
#scr{
  flex:1;position:relative;overflow:hidden;width:100%;
  background-color:#A8D8EA;
  background-image:
    linear-gradient(45deg,#FFB6E8 25%,transparent 25%),
    linear-gradient(-45deg,#FFB6E8 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#FFB6E8 75%),
    linear-gradient(-45deg,transparent 75%,#FFB6E8 75%);
  background-size:16px 16px;
  background-position:0 0,0 8px,8px -8px,-8px 0;
}
#scr.dark{background:#111!important;background-image:none!important;}

/* Character */
#cv{
  image-rendering:pixelated;image-rendering:crisp-edges;
  width:90px;height:68px;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:2;background:transparent;
}
@keyframes walk{0%,50%{transform:translate(calc(-50% - 10px),-50%) scaleX(1);}24%,74%{transform:translate(calc(-50% + 10px),-50%) scaleX(1);}25%,75%{transform:translate(calc(-50% + 10px),-50%) scaleX(-1);}49%,100%{transform:translate(calc(-50% - 10px),-50%) scaleX(-1);}}
@keyframes happy{0%,30%,60%,100%{transform:translate(-50%,-50%) translateY(0) rotate(0);}15%{transform:translate(-50%,-50%) translateY(-12px) rotate(-8deg);}45%{transform:translate(-50%,-50%) translateY(-8px) rotate(8deg);}}
@keyframes wob{0%,100%{transform:translate(-50%,-50%) rotate(0);}25%{transform:translate(-50%,-50%) rotate(-5deg);}75%{transform:translate(-50%,-50%) rotate(5deg);}}
@keyframes bob{0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-50%,calc(-50% - 2px));}}
@keyframes eat{0%,100%{transform:translate(-50%,-50%) scale(1);}30%{transform:translate(-50%,-50%) scale(1.06) rotate(-3deg);}60%{transform:translate(-50%,-50%) scale(1.06) rotate(3deg);}}
@keyframes refuse{0%,100%{transform:translate(-50%,-50%);}20%{transform:translate(calc(-50% - 3px),-50%);}40%{transform:translate(calc(-50% + 3px),-50%);}60%{transform:translate(calc(-50% - 2px),-50%);}80%{transform:translate(calc(-50% + 2px),-50%);}}
.m-walk{animation:walk 3s linear infinite;}.m-happy{animation:happy 1s ease-in-out;}.m-wob{animation:wob 1.2s ease-in-out infinite;}.m-bob{animation:bob 2.5s ease-in-out infinite;}.m-eat{animation:eat .4s ease-in-out 5;}.m-refuse{animation:refuse .4s ease-in-out;}.m-none{animation:none;transform:translate(-50%,-50%);}

#zzz{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;font-weight:900;color:#556;display:none;z-index:6;letter-spacing:2px;font-family:monospace;}
#poo{position:absolute;bottom:3px;right:3px;font-size:10px;display:none;z-index:3;}
#sick{position:absolute;top:3px;right:3px;font-size:11px;display:none;z-index:3;}
#food-item{position:absolute;top:12%;left:12%;font-size:18px;display:none;z-index:4;}

#flush{position:absolute;inset:0;display:none;z-index:8;overflow:hidden;}
#flush.show{display:block;}
@keyframes flushW{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.fl-c{position:absolute;top:0;height:100%;display:flex;flex-direction:column;justify-content:space-around;animation:flushW .8s ease-in-out forwards;font-size:8px;color:#4af;}

/* Clock */
#clock{position:absolute;inset:0;background:#f8f5f0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1px;z-index:20;font-family:'Courier New',monospace;color:#222;}
#clock.show{display:flex;}
.clk-top{display:flex;align-items:flex-end;gap:3px;margin-bottom:2px;}
.clk-ampm{font-size:7px;font-weight:bold;padding-bottom:3px;}
.clk-hm{font-size:24px;font-weight:900;letter-spacing:1px;line-height:1;}
.clk-s{font-size:11px;font-weight:bold;padding-bottom:2px;}
.clk-prog{font-size:9px;letter-spacing:2px;color:#444;font-weight:bold;}
#cl-date{font-size:8px;font-weight:700;color:#444;}
#cl-day{font-size:7px;color:#666;}

/* Game */
#ov-game{position:absolute;inset:0;background:rgba(255,255,255,.88);display:none;flex-direction:column;align-items:center;justify-content:center;gap:3px;z-index:10;color:#111;font-family:monospace;}
#ov-game.show{display:flex;}
.g-arrows{display:flex;gap:16px;font-size:22px;font-weight:900;}
.g-arr{transition:color .15s;}.g-arr.hit{color:#0a0;}.g-arr.miss{color:#c00;}
#g-result{font-size:9px;font-weight:900;min-height:12px;}
#g-score{font-size:8px;font-weight:bold;}
#g-inst{font-size:7px;color:#666;}

/* Overlays */
.ov{position:absolute;inset:0;background:rgba(255,255,255,.88);display:none;flex-direction:column;align-items:center;justify-content:center;gap:5px;z-index:10;color:#111;}
.ov.show{display:flex;}
.ob{background:#fff;border:1.5px solid #111;padding:3px 10px;font-size:8px;font-weight:900;color:#111;cursor:pointer;min-width:65px;text-align:center;font-family:monospace;box-shadow:1px 1px 0 #111;transition:.1s;}
.ob.cur{background:#111;color:#fff;transform:translate(1px,1px);box-shadow:0 0 0 #111;}
.hrow{display:flex;justify-content:space-between;width:110px;margin:1px 0;font-family:monospace;font-size:8px;font-weight:bold;}

/* ===== TRANSPARENT BUTTONS over real image buttons (z-index 10) ===== */
.tbtn{
  position:absolute;z-index:10;
  width:38px;height:38px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  /* background:rgba(255,0,0,.15); */ /* uncomment to debug */
}
.tbtn:active{background:rgba(255,255,255,.25);}
/* Button A: x=40.4% y=85.0% */
#btnA{left:calc(40.4% - 19px);top:calc(85.0% - 19px);}
/* Button B: x=52.6% y=88.1% */
#btnB{left:calc(52.6% - 19px);top:calc(88.1% - 19px);}
/* Button C: x=65.0% y=85.5% */
#btnC{left:calc(65.0% - 19px);top:calc(85.5% - 19px);}

@media(max-width:400px){#dev{width:100vw;height:calc(100vw * 414 / 380);}}
</style>
</head>

<script>
// Icons
const svgF='<svg class="bg" viewBox="0 0 36 18"><path d="M18 1C21 5,30 3,31 8C32 12,33 16,30 18C28 18,25 18,20 18C18 18,16 18,14 18C9 18,6 18,4 18C2 16,3 12,4 8C5 3,15 5,18 1Z" fill="#FFB6D9" opacity=".3"/></svg>';
const svgH='<svg class="bg" viewBox="0 0 36 18"><path d="M18 17C18 17,2 11,2 6C2 3,5 1,10 1C13 1,16 2,18 4C20 2,23 1,26 1C31 1,34 3,34 6C34 11,18 17,18 17Z" fill="#A8D8EA" opacity=".3"/></svg>';
const IC=['🍴','💡','🎮','💉','🐤','🤲','📣','😊'];
const SHP=[svgF,svgH,svgF,svgH,svgH,svgF,svgH,svgF];
['tbar','bbar'].forEach((id,ri)=>{const b=document.getElementById(id);for(let i=0;i<4;i++){const idx=ri*4+i;const d=document.createElement('div');d.className='ic '+(ri===0?'top':'bot');d.id='ic'+idx;d.innerHTML=SHP[idx]+'<span class="il">'+IC[idx]+'</span><div class="dot"></div>';d.onclick=()=>tap(idx);b.appendChild(d);}});

const cv=document.getElementById('cv'),cx=cv.getContext('2d');
function P(x,y,c){if(x>=0&&x<16&&y>=0&&y<12){cx.fillStyle=c||'#111';cx.fillRect(x,y,1,1);}}
function CL(){cx.clearRect(0,0,16,12);}
const B='#111',GN='#6ecf8a',GD='#4ab870',W='#fff';

function drChar(f){CL();const ox=4+(f%2?1:-1),oy=1;for(let i=2;i<=7;i++)P(ox+i,oy,B);P(ox+1,oy+1,B);P(ox+8,oy+1,B);for(let r=1;r<=5;r++){P(ox+1,oy+r,B);P(ox+8,oy+r,B);}P(ox,oy+2,B);P(ox+9,oy+2,B);P(ox,oy+3,B);P(ox+9,oy+3,B);P(ox,oy+4,B);P(ox+9,oy+4,B);for(let i=2;i<=7;i++)P(ox+i,oy+6,B);P(ox+1,oy+6,B);P(ox+8,oy+6,B);for(let r=1;r<=5;r++)for(let c=2;c<=7;c++)P(ox+c,oy+r,GN);for(let r=2;r<=4;r++){P(ox+1,oy+r,GN);P(ox+8,oy+r,GN);}P(ox+2,oy+1,GD);P(ox+3,oy+1,GD);P(ox+2,oy+2,GD);P(ox+3,oy+3,B);P(ox+6,oy+3,B);P(ox+4,oy+4,B);P(ox+5,oy+4,B);P(ox+2,oy+7,B);P(ox+3,oy+7,B);P(ox+6,oy+7,B);P(ox+7,oy+7,B);}
function drHappy(f){CL();const ox=4,oy=0;for(let i=2;i<=7;i++)P(ox+i,oy,B);P(ox+1,oy+1,B);P(ox+8,oy+1,B);for(let r=1;r<=5;r++){P(ox+1,oy+r,B);P(ox+8,oy+r,B);}P(ox,oy+2,B);P(ox+9,oy+2,B);P(ox,oy+3,B);P(ox+9,oy+3,B);P(ox,oy+4,B);P(ox+9,oy+4,B);for(let i=2;i<=7;i++)P(ox+i,oy+6,B);P(ox+1,oy+6,B);P(ox+8,oy+6,B);for(let r=1;r<=5;r++)for(let c=2;c<=7;c++)P(ox+c,oy+r,GN);for(let r=2;r<=4;r++){P(ox+1,oy+r,GN);P(ox+8,oy+r,GN);}P(ox+2,oy+1,GD);P(ox+3,oy+1,GD);P(ox+2,oy+2,GD);P(ox+3,oy+3,B);P(ox+4,oy+2,B);P(ox+6,oy+3,B);P(ox+5,oy+2,B);P(ox+4,oy+4,B);P(ox+5,oy+4,B);P(ox+4,oy+5,B);P(ox+5,oy+5,B);P(ox,oy+1,B);P(ox+9,oy+1,B);P(ox+2,oy+7,B);P(ox+3,oy+7,B);P(ox+6,oy+7,B);P(ox+7,oy+7,B);}
function drSleep(f){CL();const ox=3,oy=3;for(let i=1;i<=8;i++)P(ox+i,oy,B);P(ox,oy+1,B);P(ox+9,oy+1,B);for(let r=1;r<=3;r++){P(ox,oy+r,B);P(ox+9,oy+r,B);}for(let i=1;i<=8;i++)P(ox+i,oy+4,B);for(let r=1;r<=3;r++)for(let c=1;c<=8;c++)P(ox+c,oy+r,GN);P(ox+1,oy+1,GD);P(ox+2,oy+1,GD);P(ox+3,oy+2,B);P(ox+4,oy+2,B);P(ox+6,oy+2,B);P(ox+7,oy+2,B);}
function drEgg(f){CL();const ox=4+(f%2),oy=1;for(let i=2;i<=5;i++){P(ox+i,oy,B);P(ox+i,oy+8,B);}P(ox+1,oy+1,B);P(ox+6,oy+1,B);for(let r=2;r<=7;r++){P(ox,oy+r,B);P(ox+7,oy+r,B);}P(ox+1,oy+8,B);P(ox+6,oy+8,B);for(let r=1;r<=7;r++)for(let c=1;c<=6;c++)P(ox+c,oy+r,W);P(ox+2,oy+3,B);P(ox+3,oy+3,B);P(ox+2,oy+4,B);P(ox+1,oy+4,B);P(ox+4,oy+5,B);P(ox+5,oy+5,B);P(ox+5,oy+4,B);P(ox+2,oy+6,B);P(ox+3,oy+6,B);}
function drDe(){CL();const ox=5,oy=3;for(let i=1;i<=4;i++)P(ox+i,oy,B);for(let r=1;r<=4;r++){P(ox,oy+r,B);P(ox+5,oy+r,B);}for(let r=1;r<=4;r++)for(let c=1;c<=4;c++)P(ox+c,oy+r,'#888');P(ox+2,oy+1,B);P(ox+3,oy+1,B);P(ox+1,oy+2,B);P(ox+2,oy+2,B);P(ox+3,oy+2,B);P(ox+4,oy+2,B);P(ox+2,oy+3,B);P(ox+3,oy+3,B);for(let i=0;i<7;i++)P(ox+i,oy+5,'#654321');}

const CH={egg:{id:'egg',s:0,d:drEgg},b1:{id:'b1',s:1,d:drChar},b2:{id:'b2',s:1,d:drChar},c1:{id:'c1',s:2,d:drChar},c2:{id:'c2',s:2,d:drChar},c3:{id:'c3',s:2,d:drChar},a1:{id:'a1',s:3,d:drChar},a2:{id:'a2',s:3,d:drChar},a3:{id:'a3',s:3,d:drChar},a4:{id:'a4',s:3,d:drChar},se:{id:'se',s:4,d:drChar},de:{id:'de',s:-1,d:drDe}};
const C={MAX:5,TK:6000,AT:25000,SH:21,WH:7,DM:5,GR:5,EV:[12,45,85,170]};
const def={c:CH.egg,hu:3,ha:3,di:0,wt:5,po:0,si:false,sl:false,li:true,at:false,aT:null,aS:0,mi:0,ag:0,tk:0,ev:0,de:false,ov:null,ic:-1,af:0,clk:false,sound:true,snackCount:0,lastTick:Date.now(),lastDay:new Date().getDate(),gw:0,gr:0,gPlaying:false,gWait:false};
let S={...def};
function save(){try{localStorage.setItem('tama5',JSON.stringify({...S,c:S.c.id}));}catch(e){}}
function load(){try{const d=localStorage.getItem('tama5');if(d){const p=JSON.parse(d);S={...def,...p,c:CH[p.c]||CH.egg};S.gPlaying=false;S.gWait=false;}}catch(e){}}
load();

let ax;function bp(f=800,d=50){if(!S.sound)return;try{if(!ax)ax=new(window.AudioContext||window.webkitAudioContext)();if(ax.state==='suspended')ax.resume();const o=ax.createOscillator(),g=ax.createGain();o.type='square';o.frequency.value=f;g.gain.value=0.04;o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+d/1000);}catch(e){}}

function setAn(n,dur){const c=cv.classList;c.remove('m-walk','m-happy','m-wob','m-bob','m-eat','m-refuse','m-none');c.add('m-'+n);if(dur)setTimeout(()=>{if(!S.de)aAn();},dur);}
function aAn(){if(S.de){setAn('none');return;}if(S.sl){setAn('bob');return;}if(S.si){setAn('wob');return;}if(S.c.s===0){setAn('wob');return;}setAn('walk');}

function uClock(){const n=new Date(),ds=['日','月','火','水','木','金','土'];let h=n.getHours();const m=n.getMinutes(),s=n.getSeconds();document.getElementById('cl-ampm').textContent=h>=12?'PM':'AM';h=h%12||12;document.getElementById('cl-hm').textContent=h+':'+String(m).padStart(2,'0');document.getElementById('cl-s').textContent=String(s).padStart(2,'0');let fc=Math.min(Math.floor(s/10),5);let ps='';for(let i=0;i<5;i++)ps+=(i<fc)?'\u25b6':'\uff1e';document.getElementById('cl-prog').textContent=ps;document.getElementById('cl-date').textContent=n.getFullYear()+'/'+(n.getMonth()+1)+'/'+n.getDate();document.getElementById('cl-day').textContent=ds[n.getDay()]+'曜日';}
setInterval(uClock,1000);uClock();

let curBtns=[],curIdx=0;
function uMenu(){['ovf','ovh','ov-set'].forEach(id=>document.getElementById(id).classList.remove('show'));if(S.ov&&!S.gPlaying){const map={f:'ovf',h:'ovh',set:'ov-set'};const el=document.getElementById(map[S.ov]);if(el){el.classList.add('show');curBtns=Array.from(el.querySelectorAll('.ob'));curBtns.forEach((b,i)=>b.classList.toggle('cur',i===curIdx));};}else{curBtns=[];curIdx=0;}}

function doFlush(){const fl=document.getElementById('flush');fl.innerHTML='';fl.classList.add('show');const ch=['\u25c0','\u25c5','\u226a','\u3008'];for(let c=0;c<8;c++){const d=document.createElement('div');d.className='fl-c';d.style.left=c*13+'%';d.style.width='13%';d.style.animationDelay=(c*.07)+'s';let t='';for(let r=0;r<6;r++)t+=ch[Math.floor(Math.random()*ch.length)]+'<br>';d.innerHTML=t;fl.appendChild(d);}bp(400,100);setTimeout(()=>bp(300,100),200);setTimeout(()=>{fl.classList.remove('show');fl.innerHTML='';R();},1200);}
function showFood(e){const fi=document.getElementById('food-item');fi.textContent=e;fi.style.display='block';setAn('eat',2200);setTimeout(()=>{fi.style.display='none';},2200);}

function R(){
  const scr=document.getElementById('scr'),isDark=!S.li;
  scr.classList.toggle('dark',isDark);
  if(isDark){cv.style.display='none';document.getElementById('zzz').style.display=S.sl?'block':'none';document.getElementById('poo').style.display='none';document.getElementById('sick').style.display='none';}
  else{cv.style.display='block';if(S.de)drDe();else if(S.sl)drSleep(S.af);else S.c.d(S.af);document.getElementById('zzz').style.display='none';document.getElementById('poo').style.display=(S.po>0&&!S.de)?'block':'none';document.getElementById('poo').textContent='\ud83d\udca9'.repeat(Math.min(S.po,3));document.getElementById('sick').style.display=(S.si&&!S.de)?'block':'none';}
  document.querySelectorAll('.ic').forEach((el,i)=>el.classList.toggle('sel',S.ic===i));
  document.getElementById('clock').classList.toggle('show',S.clk);
  document.getElementById('ov-game').classList.toggle('show',S.gPlaying);
  document.getElementById('snd-stat').textContent=S.sound?'ON':'OFF';
  uMenu();
}

function tap(i){bp(600,20);if(S.de||S.ov||S.clk||S.gPlaying)return;if(S.ic===i){ex(i);S.ic=-1;}else S.ic=i;R();}
function pA(){bp(600,20);if(S.clk)return;if(S.gPlaying&&!S.gWait){gameAns('L');return;}if(S.ov){if(curBtns.length)curIdx=(curIdx+1)%curBtns.length;uMenu();return;}S.ic=(S.ic+1)%8;R();}
function pB(){bp(800,20);if(S.clk){S.clk=false;R();return;}if(S.gPlaying)return;if(S.ov){if(curBtns[curIdx])handleAct(curBtns[curIdx].dataset.action);return;}if(S.ic<0){S.clk=true;R();return;}ex(S.ic);S.ic=-1;R();}
function pC(){bp(400,20);if(S.clk)return;if(S.gPlaying&&!S.gWait){gameAns('R');return;}if(S.ov){xOv();return;}S.ic=-1;R();}

function handleAct(a){if(!a)return;switch(a){case'close':xOv();break;case'feed_m':doFeed('m');break;case'feed_s':doFeed('s');break;case'tog_snd':S.sound=!S.sound;bp(1200,40);save();R();break;}}
function ex(i){if(S.de)return;switch(i){case 0:if(S.c.s===0||S.sl)return;S.ov='f';curIdx=0;R();break;case 1:S.li=!S.li;if(S.sl&&!S.li&&S.at&&S.aT==='li'){S.at=false;S.aT=null;}aAn();save();R();break;case 2:if(S.c.s===0||S.sl||S.si||S.hu===0)return;startGame();break;case 3:if(S.sl||!S.si)return;S.si=false;if(S.at&&S.aT==='si'){S.at=false;S.aT=null;}bp(1200,80);drHappy(0);setAn('happy',1200);save();R();break;case 4:if(S.sl||S.po===0)return;S.po=0;if(S.at&&S.aT==='po'){S.at=false;S.aT=null;}doFlush();save();break;case 5:oHP();break;case 6:if(S.sl)return;if(S.at&&S.aT==='ta'){S.di=Math.min(C.MAX,S.di+1);S.at=false;S.aT=null;bp(1200,80);drHappy(0);setAn('happy',1200);}save();R();break;case 7:break;}}
function xOv(){S.ov=null;R();}
function doFeed(t){S.ov=null;if(S.si){setAn('refuse',500);R();return;}if(t==='m'){if(S.hu>=C.MAX){setAn('refuse',500);R();return;}S.hu=Math.min(C.MAX,S.hu+1);S.wt=Math.min(35,S.wt+1);showFood('\ud83c\udf59');bp(1000,50);}else{if(S.ha>=C.MAX){setAn('refuse',500);R();return;}S.ha=Math.min(C.MAX,S.ha+1);S.wt=Math.min(35,S.wt+2);showFood('\ud83c\udf6c');bp(1000,50);if(S.c.s<=2){S.snackCount++;if(S.snackCount>3&&Math.random()<.6){S.si=true;aAn();}}}if(S.at&&(S.aT==='hu'||S.aT==='un')){S.at=false;S.aT=null;}save();R();}

function startGame(){S.gPlaying=true;S.gw=0;S.gr=0;S.gWait=false;document.getElementById('g-result').textContent='A=\u3072\u3060\u308a\u3000C=\u307f\u304e';document.getElementById('g-score').textContent='0 / 0';document.getElementById('ga-l').className='g-arr';document.getElementById('ga-r').className='g-arr';R();}
function gameAns(dir){S.gWait=true;const cpu=Math.random()<.5?'L':'R';S.gr++;const hit=dir===cpu;if(hit)S.gw++;document.getElementById('ga-l').className='g-arr'+(cpu==='L'?' hit':'');document.getElementById('ga-r').className='g-arr'+(cpu==='R'?' hit':'');if(dir==='L')document.getElementById('ga-l').classList.add(hit?'hit':'miss');if(dir==='R')document.getElementById('ga-r').classList.add(hit?'hit':'miss');document.getElementById('g-result').textContent=hit?'\u2b55 \u3042\u305f\u308a\uff01':'\u274c \u306f\u305a\u308c\u2026';document.getElementById('g-score').textContent=S.gw+' / '+S.gr;bp(hit?1200:300,50);if(S.gr>=C.GR){setTimeout(()=>{S.gPlaying=false;if(S.gw>=3){S.ha=Math.min(C.MAX,S.ha+1);drHappy(0);setAn('happy',1200);}S.hu=Math.max(0,S.hu-1);S.wt=Math.max(5,S.wt-1);if(S.at&&S.aT==='un'){S.at=false;S.aT=null;}save();R();},1200);}else{setTimeout(()=>{S.gWait=false;document.getElementById('ga-l').className='g-arr';document.getElementById('ga-r').className='g-arr';document.getElementById('g-result').textContent='A=\u3072\u3060\u308a\u3000C=\u307f\u304e';},800);}}

function oHP(){S.ov='h';curIdx=0;const h=v=>{let s='';for(let i=0;i<C.MAX;i++)s+=i<v?'\u2665':'\u2661';return s;};document.getElementById('hag').textContent=S.ag+'\u3055\u3044';document.getElementById('hwt').textContent=S.wt+'g';document.getElementById('hhu').textContent=h(S.hu);document.getElementById('hha').textContent=h(S.ha);document.getElementById('hdi').textContent=h(S.di);R();}

function evo(){const st=S.c.s;if(st===0)return Math.random()<.5?CH.b1:CH.b2;if(st===1){const r=Math.random();return r<.4?CH.c1:r<.7?CH.c2:CH.c3;}if(st===2){const sc=S.hu+S.ha+S.di-(S.mi*2);if(sc>=8)return CH.a1;if(sc>=4)return CH.a2;if(sc>=0)return CH.a3;return CH.a4;}if(st===3&&S.di>=C.MAX&&S.mi===0)return CH.se;return null;}
function cEvo(){const th=C.EV[S.c.s]||9999;if(S.ev<th)return;const t=evo();if(!t){S.ev=0;return;}bp(600,60);setTimeout(()=>bp(800,60),120);setTimeout(()=>bp(1000,60),240);setTimeout(()=>bp(1200,120),360);let fl=0;const iv=setInterval(()=>{CL();if(fl%2===0)for(let y=0;y<12;y++)for(let x=0;x<16;x++)if((x+y+fl)%3===0)P(x,y,B);fl++;if(fl>10){clearInterval(iv);S.c=t;S.ev=0;if(t.s===1){S.wt=8;S.hu=3;S.ha=3;}aAn();save();R();}},140);}

function doTick(vt){const h=new Date(vt).getHours(),sl=h>=C.SH||h<C.WH;if(sl&&!S.sl){S.sl=true;aAn();}if(!sl&&S.sl){S.sl=false;S.li=true;aAn();}if(S.c.s===0){S.ev++;cEvo();return;}S.snackCount=Math.max(0,S.snackCount-.1);if(!S.sl){if(Math.random()<.06)S.hu=Math.max(0,S.hu-1);if(Math.random()<.05)S.ha=Math.max(0,S.ha-1);}else if(Math.random()<.02)S.hu=Math.max(0,S.hu-1);if(Math.random()<(S.sl?.01:.02)&&S.po<4)S.po++;if(!S.si){let p=.01+S.po*.03;if(S.hu===0)p+=.05;if(Math.random()<p){S.si=true;aAn();}}else if(Math.random()<.05)S.mi++;if(S.hu===0&&S.wt>5&&Math.random()<.1)S.wt--;S.tk++;S.ev++;if(S.mi>=C.DM){S.de=true;S.c=CH.de;setAn('none');return;}if(!S.at){if(S.sl&&S.li)sAt('li',vt);else if(!S.sl){if(S.si)sAt('si',vt);else if(S.po>=2)sAt('po',vt);else if(S.hu===0)sAt('hu',vt);else if(S.ha===0)sAt('un',vt);else if(Math.random()<.05&&S.hu>=C.MAX&&S.ha>=C.MAX)sAt('ta',vt);}}if(S.at&&vt-S.aS>=C.AT){S.mi++;S.at=false;S.aT=null;}cEvo();}
function sAt(t,v){S.at=true;S.aT=t;S.aS=v;bp(500,80);}
function checkMid(){const d=new Date().getDate();if(S.lastDay!==d){if(!S.de&&S.c.s!==0)S.ag++;S.lastDay=d;}}
function updateTicks(){if(S.de)return;const now=Date.now();checkMid();const e=now-S.lastTick;if(e>=C.TK){const t=Math.floor(e/C.TK),pt=Math.min(t,10000);for(let i=0;i<pt;i++){if(S.de)break;doTick(now-e+(i*C.TK));}S.lastTick+=t*C.TK;save();R();}}

setInterval(()=>{S.af=1-S.af;R();},500);
setInterval(updateTicks,1000);
aAn();R();
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')pA();if(e.key==='ArrowDown'||e.key==='Enter'||e.key==='s')pB();if(e.key==='ArrowRight'||e.key==='Escape'||e.key==='d')pC();});
</script>
</body>
