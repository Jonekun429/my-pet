<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>たまごっち</title>
<style>
:root{--pk:#FFB6E8;--bl:#A8D8EA;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{
  font-family:sans-serif;
  background:#1a1a2e;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;min-height:100dvh;overflow:hidden;
}

/* ===== EGG — rounder, wider ===== */
#egg{
  width:320px;height:420px;
  background:
    radial-gradient(ellipse at 42% 32%,rgba(255,255,255,.30) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 45%,#5cc8e8 0%,#3aade0 30%,#2898cc 55%,#1c7eb0 80%,#15689a 100%);
  border-radius:50% 50% 47% 47% / 52% 52% 44% 44%;
  box-shadow:
    inset 0 -18px 40px rgba(0,0,0,.18),
    inset 0 8px 20px rgba(255,255,255,.12),
    0 0 0 3px #0d5a82,
    0 12px 40px rgba(0,0,0,.5);
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}

/* Ring */
#egg::before{
  content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle,#e0e0e0 30%,#aaa 100%);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.4);
  border:2px solid #999;z-index:5;
}

/* ===== SCREEN FRAME ===== */
#frame{
  margin-top:38px;
  width:248px;
  border-radius:12px;
  overflow:hidden;
  border:4px solid #0d4a6a;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.4);
  background:#0d4a6a;
}

/* Icon bars */
.bar{
  height:40px;
  background:linear-gradient(180deg,#FFF8DC,#FFEEB4);
  display:flex;justify-content:space-around;align-items:center;
  padding:0 6px;
}

/* Icon button */
.ic{
  width:50px;height:34px;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .06s;
}
.ic:active{transform:scale(.88);}
.ic svg{position:absolute;width:100%;height:100%;top:0;left:0;}
.ic .il{position:relative;z-index:2;font-size:14px;opacity:.55;transition:opacity .1s;}
.ic.sel .il{opacity:1;}
.ic .dot{
  position:absolute;width:5px;height:5px;border-radius:50%;
  background:#e05090;display:none;
}
.ic.sel .dot{display:block;}
.ic.top-ic .dot{bottom:-4px;left:50%;transform:translateX(-50%);}
.ic.bot-ic .dot{top:-4px;left:50%;transform:translateX(-50%);}

/* ===== SCREEN ===== */
#scr{
  width:100%;height:200px;
  position:relative;overflow:hidden;
  background-color:var(--bl);
  background-image:
    linear-gradient(45deg,var(--pk) 25%,transparent 25%),
    linear-gradient(-45deg,var(--pk) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,var(--pk) 75%),
    linear-gradient(-45deg,transparent 75%,var(--pk) 75%);
  background-size:40px 40px;
  background-position:0 0,0 20px,20px -20px,-20px 0;
}

/* Night: softer dark, still visible pattern */
#scr.night{
  background-color:#2a3050;
  background-image:
    linear-gradient(45deg,#222848 25%,transparent 25%),
    linear-gradient(-45deg,#222848 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#222848 75%),
    linear-gradient(-45deg,transparent 75%,#222848 75%);
  background-size:40px 40px;
  background-position:0 0,0 20px,20px -20px,-20px 0;
}

/* ===== CHARACTER ===== */
#cv{
  image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;
  width:130px;height:130px;
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
}

@keyframes walk{
  0%  {transform:translate(calc(-50% - 25px),-50%) scaleX(1);}
  24% {transform:translate(calc(-50% + 25px),-50%) scaleX(1);}
  25% {transform:translate(calc(-50% + 25px),-50%) scaleX(-1);}
  49% {transform:translate(calc(-50% - 25px),-50%) scaleX(-1);}
  50% {transform:translate(calc(-50% - 25px),-50%) scaleX(1);}
  74% {transform:translate(calc(-50% + 25px),-50%) scaleX(1);}
  75% {transform:translate(calc(-50% + 25px),-50%) scaleX(-1);}
  100%{transform:translate(calc(-50% - 25px),-50%) scaleX(-1);}
}
@keyframes boing{0%,100%{transform:translate(-50%,-50%) scaleY(1);}50%{transform:translate(-50%,-65%) scaleY(1.05);}}
@keyframes wob{0%,100%{transform:translate(-50%,-50%) rotate(0);}25%{transform:translate(-50%,-50%) rotate(-7deg);}75%{transform:translate(-50%,-50%) rotate(7deg);}}
@keyframes bob{0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-50%,-54%);}}
.a-walk{animation:walk 3.5s linear infinite;}
.a-boing{animation:boing .5s ease-in-out 3;}
.a-wob{animation:wob 1.2s ease-in-out infinite;}
.a-bob{animation:bob 2.5s ease-in-out infinite;}
.a-none{animation:none;transform:translate(-50%,-50%);}

/* Zzz — only when sleeping */
#zzz{position:absolute;top:25px;right:22px;font-size:18px;font-weight:800;color:#555;display:none;letter-spacing:2px;}
#scr.night #zzz{color:#8a8;}

/* Poop */
#poo{position:absolute;bottom:12px;right:12px;font-size:20px;display:none;}

/* Overlays */
.ov{
  position:absolute;inset:0;background:rgba(0,0,0,.86);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:20;
}
.ov.show{display:flex;}
.ob{
  background:linear-gradient(135deg,#fffae6,#fff0d0);
  border:3px solid #c49a6c;border-radius:12px;
  padding:9px 22px;font-size:13px;font-weight:700;color:#333;
  cursor:pointer;min-width:110px;text-align:center;
}
.ob:active{transform:scale(.94);}

/* Game */
#ov-g .gd{font-size:44px;margin:6px 0;}
.gr{display:flex;gap:14px;}
.gb{
  width:52px;height:52px;border-radius:50%;
  background:#1a1a1a;border:3px solid #0f0;color:#0f0;
  font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.gb:active{transform:scale(.9);}
.gb.ok{background:#0a3a0a;}.gb.ng{background:#3a0a0a;border-color:#f00;}
#g-sc{color:#0f0;font-size:12px;font-family:monospace;margin-top:4px;}

/* Health */
#ov-h{color:#0f0;font-family:monospace;font-size:13px;}
.hrow{display:flex;justify-content:space-between;width:170px;margin:2px 0;}

/* ===== 3 BUTTONS — clean, no labels ===== */
#btns{
  margin-top:18px;
  display:flex;gap:14px;
}
.btn{
  width:52px;height:52px;border-radius:50%;
  border:3px solid #b08820;cursor:pointer;
  background:linear-gradient(180deg,#ffd644,#e0b428);
  box-shadow:0 4px 0 #9a7818,0 6px 10px rgba(0,0,0,.3),inset 0 2px 4px rgba(255,255,255,.35);
  transition:transform .05s,box-shadow .05s;
}
.btn:active{transform:translateY(4px);box-shadow:0 0 0 #9a7818,0 2px 5px rgba(0,0,0,.3);}

@media(max-width:350px){
  #egg{width:290px;height:385px;}
  #frame{width:226px;margin-top:34px;}
  #scr{height:180px;}
  .bar{height:36px;}
  .btn{width:46px;height:46px;}
}
</style>
</head>
<body>
<div id="egg">
  <div id="frame">
    <!-- Top icons: Feed, Light, Game, Medicine -->
    <div class="bar" id="tbar"></div>
    <div id="scr">
      <canvas id="cv" width="16" height="16"></canvas>
      <div id="zzz">Zzz</div>
      <div id="poo"></div>

      <!-- Feed -->
      <div class="ov" id="ov-f">
        <div class="ob" onclick="doFeed('m')">🍙 ごはん</div>
        <div class="ob" onclick="doFeed('s')">🍬 おやつ</div>
        <div class="ob" onclick="xOv()">← もどる</div>
      </div>
      <!-- Game -->
      <div class="ov" id="ov-g">
        <div style="color:#0f0;font-weight:700;">🎮 LR ゲーム</div>
        <div class="gd" id="gd">？</div>
        <div class="gr"><div class="gb" id="gl" onclick="gA('L')">◀</div><div class="gb" id="gr2" onclick="gA('R')">▶</div></div>
        <div id="g-sc">0/0</div>
        <div class="ob" onclick="gE()">おわる</div>
      </div>
      <!-- Health -->
      <div class="ov" id="ov-h">
        <div style="font-weight:700;margin-bottom:4px;">📋 けんこう</div>
        <div class="hrow"><span>なまえ</span><span id="hn"></span></div>
        <div class="hrow"><span>ねんれい</span><span id="ha"></span></div>
        <div class="hrow"><span>たいじゅう</span><span id="hw"></span></div>
        <div class="hrow"><span>おなか</span><span id="hh"></span></div>
        <div class="hrow"><span>ごきげん</span><span id="hp2"></span></div>
        <div class="hrow"><span>しつけ</span><span id="hd"></span></div>
        <div class="ob" style="margin-top:6px;" onclick="xOv()">← もどる</div>
      </div>
    </div>
    <!-- Bottom icons: Toilet, Health, Discipline, Attention -->
    <div class="bar" id="bbar"></div>
  </div>
  <div id="btns">
    <div class="btn" onclick="pA()"></div>
    <div class="btn" onclick="pB()"></div>
    <div class="btn" onclick="pC()"></div>
  </div>
</div>

<script>
// =======================================================================
//  ICON BAR SETUP
// =======================================================================
const FLW='<svg viewBox="0 0 50 34"><path d="M25 2C29 9,40 6,42 13C45 19,47 26,43 31C40 34,35 35,28 35C26 35,24 35,22 35C15 35,10 34,7 31C3 26,5 19,8 13C10 6,21 9,25 2Z" fill="#FFB6D9" stroke="#e899ba" stroke-width="1"/></svg>';
const HRT='<svg viewBox="0 0 50 34"><path d="M25 33C25 33,3 22,3 13C3 7,9 2,16 2C20 2,23 4,25 7C27 4,30 2,34 2C41 2,47 7,47 13C47 22,25 33,25 33Z" fill="#A8D8EA" stroke="#8bbdd9" stroke-width="1"/></svg>';

const ICONS=['🍴','💡','🎮','💉','🚿','📊','📣','😊'];
const SHAPES=[FLW,HRT,FLW,HRT, HRT,FLW,HRT,FLW];

function buildBar(){
  ['tbar','bbar'].forEach((bid,ri)=>{
    const bar=document.getElementById(bid);
    for(let i=0;i<4;i++){
      const idx=ri*4+i;
      const d=document.createElement('div');
      d.className='ic '+(ri===0?'top-ic':'bot-ic');
      d.id='ic'+idx;
      d.innerHTML=SHAPES[idx]+'<span class="il">'+ICONS[idx]+'</span><div class="dot"></div>';
      d.onclick=()=>tap(idx);
      bar.appendChild(d);
    }
  });
}
buildBar();

// =======================================================================
//  PIXEL ART (16x16 canvas → 130px display)
// =======================================================================
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
cv.width=16;cv.height=16;
function P(x,y,c){cx.fillStyle=c;cx.fillRect(x,y,1,1);}
function CL(){cx.clearRect(0,0,16,16);}
const B='#000',W='#fff';

// ---- Characters ----
function drEgg(f){
  CL();const d=f%2,ox=4+d,oy=3;
  [2,3,4,5].forEach(i=>{P(ox+i,oy,B);P(ox+i,oy+7,B);});
  for(let r=1;r<=6;r++){P(ox+1,oy+r,B);P(ox+6,oy+r,B);}
  for(let r=1;r<=6;r++)for(let c=2;c<=5;c++)P(ox+c,oy+r,W);
  P(ox+2,oy+4,'#ccc');P(ox+3,oy+3,'#ccc');P(ox+4,oy+4,'#ccc');P(ox+5,oy+3,'#ccc');
}

function drBaby1(f){
  CL();const ox=5+(f%2?1:-1),oy=4,C='#FFE040';
  [1,2,3,4].forEach(i=>P(ox+i,oy,B));
  P(ox,oy+1,B);[1,2,3,4].forEach(i=>P(ox+i,oy+1,C));P(ox+5,oy+1,B);
  P(ox,oy+2,B);P(ox+1,oy+2,C);P(ox+2,oy+2,B);P(ox+3,oy+2,C);P(ox+4,oy+2,B);P(ox+5,oy+2,B);
  P(ox,oy+3,B);[1,2,3,4].forEach(i=>P(ox+i,oy+3,C));P(ox+5,oy+3,B);
  P(ox+1,oy+4,B);P(ox+2,oy+4,C);P(ox+3,oy+4,B);P(ox+4,oy+4,B);
  [1,2,3,4].forEach(i=>P(ox+i,oy+5,B));
  P(ox+1,oy+6,B);P(ox+4,oy+6,B);
}

function drBaby2(f){
  CL();const ox=5+(f%2?1:-1),oy=4,C='#555';
  [1,2,3,4].forEach(i=>P(ox+i,oy,B));
  P(ox,oy+1,B);[1,2,3,4].forEach(i=>P(ox+i,oy+1,C));P(ox+5,oy+1,B);
  P(ox,oy+2,B);P(ox+1,oy+2,C);P(ox+2,oy+2,W);P(ox+3,oy+2,C);P(ox+4,oy+2,W);P(ox+5,oy+2,B);
  P(ox,oy+3,B);[1,2,3,4].forEach(i=>P(ox+i,oy+3,C));P(ox+5,oy+3,B);
  [1,2,3,4].forEach(i=>P(ox+i,oy+4,B));
  P(ox+1,oy+5,B);P(ox+4,oy+5,B);
}

function drMarutchi(f){
  CL();const ox=3+(f%2?2:-1),oy=3,G='#7BC043',L='#8ED44F';
  P(ox,oy+2,B);P(ox,oy+3,B);P(ox+1,oy+1,B);P(ox+1,oy+2,G);
  [3,4,5,6].forEach(i=>P(ox+i,oy,B));
  P(ox+2,oy+1,B);[3,4,5,6].forEach(i=>P(ox+i,oy+1,L));P(ox+7,oy+1,B);
  for(let r=2;r<=5;r++){P(ox+2,oy+r,B);for(let c=3;c<=6;c++)P(ox+c,oy+r,G);P(ox+7,oy+r,B);}
  P(ox+6,oy+2,B);
  P(ox+5,oy+4,B);P(ox+6,oy+4,B);
  [3,4,5,6].forEach(i=>P(ox+i,oy+6,B));
  P(ox+3,oy+7,B);P(ox+6,oy+7,B);
  P(ox+9,oy+2,B);P(ox+10,oy+1,B);P(ox+10,oy+2,B);P(ox+10,oy+3,B);P(ox+11,oy+2,B);
}

function drTongaritchi(f){
  CL();const ox=5+(f%2?1:-1),oy=2,O='#FF9933',Y='#FFCC00';
  P(ox+2,oy,B);
  [1,2,3].forEach(i=>P(ox+i,oy+1,B));
  P(ox,oy+2,B);[1,2,3].forEach(i=>P(ox+i,oy+2,O));P(ox+4,oy+2,B);
  for(let r=3;r<=5;r++){P(ox,oy+r,B);[1,2,3].forEach(i=>P(ox+i,oy+r,Y));P(ox+4,oy+r,B);}
  P(ox+1,oy+3,B);P(ox+3,oy+3,B);
  P(ox+2,oy+5,B);
  [1,2,3].forEach(i=>P(ox+i,oy+6,B));
  P(ox+1,oy+7,B);P(ox+3,oy+7,B);
}

function drKuchitchi(f){
  CL();const ox=5+(f%2?1:-1),oy=3,G='#8BC34A';
  [1,2,3,4].forEach(i=>P(ox+i,oy,B));
  P(ox,oy+1,B);[1,2,3,4].forEach(i=>P(ox+i,oy+1,G));P(ox+5,oy+1,B);
  P(ox,oy+2,B);P(ox+1,oy+2,B);P(ox+2,oy+2,G);P(ox+3,oy+2,G);P(ox+4,oy+2,B);P(ox+5,oy+2,B);
  P(ox,oy+3,B);[1,2,3,4].forEach(i=>P(ox+i,oy+3,G));P(ox+5,oy+3,B);
  P(ox+1,oy+4,B);P(ox+2,oy+4,'#FF8C00');P(ox+3,oy+4,'#FF8C00');P(ox+4,oy+4,B);
  P(ox+2,oy+5,'#FF8C00');P(ox+3,oy+5,'#FF8C00');
  [1,2,3,4].forEach(i=>P(ox+i,oy+6,B));
  P(ox+1,oy+7,B);P(ox+4,oy+7,B);
}

function drMametchi(f){
  CL();const ox=3+(f%2?1:-1),oy=2;
  P(ox+1,oy,B);P(ox+2,oy,B);P(ox+7,oy,B);P(ox+8,oy,B);
  P(ox+1,oy+1,B);P(ox+2,oy+1,'#333');P(ox+7,oy+1,'#333');P(ox+8,oy+1,B);
  [3,4,5,6].forEach(i=>P(ox+i,oy+1,B));
  P(ox+2,oy+2,B);[3,4,5,6].forEach(i=>P(ox+i,oy+2,W));P(ox+7,oy+2,B);
  P(ox+2,oy+3,B);P(ox+3,oy+3,B);P(ox+4,oy+3,W);P(ox+5,oy+3,W);P(ox+6,oy+3,B);P(ox+7,oy+3,B);
  P(ox+2,oy+4,B);[3,4,5,6].forEach(i=>P(ox+i,oy+4,W));P(ox+7,oy+4,B);
  P(ox+4,oy+4,B);P(ox+5,oy+4,B);
  P(ox+3,oy+5,B);[4,5].forEach(i=>P(ox+i,oy+5,W));P(ox+6,oy+5,B);
  P(ox+3,oy+6,B);[4,5].forEach(i=>P(ox+i,oy+6,W));P(ox+6,oy+6,B);
  P(ox+1,oy+5,B);P(ox+2,oy+5,B);P(ox+7,oy+5,B);P(ox+8,oy+5,B);
  [3,4,5,6].forEach(i=>P(ox+i,oy+7,B));
  P(ox+3,oy+8,B);P(ox+6,oy+8,B);
}

function drGinjiro(f){
  CL();const ox=4+(f%2?1:-1),oy=3;
  [2,3,4,5].forEach(i=>P(ox+i,oy,B));
  P(ox+1,oy+1,B);[2,3,4,5].forEach(i=>P(ox+i,oy+1,'#E0E0E0'));P(ox+6,oy+1,B);
  for(let r=2;r<=4;r++){P(ox+1,oy+r,B);[2,3,4,5].forEach(i=>P(ox+i,oy+r,W));P(ox+6,oy+r,B);}
  P(ox+2,oy+2,B);P(ox+5,oy+2,B);
  P(ox+3,oy+4,B);P(ox+4,oy+4,B);
  [2,3,4,5].forEach(i=>P(ox+i,oy+5,B));
  P(ox+2,oy+6,B);P(ox+5,oy+6,B);
}

function drMaskutchi(f){
  CL();const ox=4+(f%2?1:-1),oy=3,T='#D2B48C';
  [2,3,4,5].forEach(i=>P(ox+i,oy,B));
  P(ox+1,oy+1,B);[2,3,4,5].forEach(i=>P(ox+i,oy+1,T));P(ox+6,oy+1,B);
  P(ox+2,oy+1,B);P(ox+5,oy+1,B);
  for(let r=2;r<=3;r++){P(ox+1,oy+r,B);[2,3,4,5].forEach(i=>P(ox+i,oy+r,'#aaa'));P(ox+6,oy+r,B);}
  P(ox+1,oy+4,B);[2,3,4,5].forEach(i=>P(ox+i,oy+4,T));P(ox+6,oy+4,B);
  [2,3,4,5].forEach(i=>P(ox+i,oy+5,B));
  P(ox+2,oy+6,B);P(ox+5,oy+6,B);
  P(ox,oy+3,B);P(ox+7,oy+3,B);
}

function drKuchiTama(f){
  CL();const ox=5+(f%2?1:-1),oy=3,C='#DDA0DD';
  [1,2,3,4].forEach(i=>P(ox+i,oy,B));
  P(ox,oy+1,B);[1,2,3,4].forEach(i=>P(ox+i,oy+1,C));P(ox+5,oy+1,B);
  P(ox,oy+2,B);P(ox+1,oy+2,B);P(ox+2,oy+2,C);P(ox+3,oy+2,C);P(ox+4,oy+2,B);P(ox+5,oy+2,B);
  P(ox,oy+3,B);[1,2,3,4].forEach(i=>P(ox+i,oy+3,C));P(ox+5,oy+3,B);
  P(ox+1,oy+4,B);P(ox+2,oy+4,B);P(ox+3,oy+4,B);P(ox+4,oy+4,B);
  [1,2,3,4].forEach(i=>P(ox+i,oy+5,B));
  P(ox+1,oy+6,B);P(ox+4,oy+6,B);
}

function drOyajitchi(f){
  CL();const ox=4+(f%2?1:-1),oy=2,F='#FFDAB9';
  P(ox+4,oy,B);
  [2,3,4,5].forEach(i=>P(ox+i,oy+1,B));
  P(ox+1,oy+2,B);[2,3,4,5].forEach(i=>P(ox+i,oy+2,F));P(ox+6,oy+2,B);
  P(ox+2,oy+2,B);P(ox+5,oy+2,B);
  P(ox+1,oy+3,B);P(ox+2,oy+3,B);P(ox+3,oy+3,F);P(ox+4,oy+3,B);P(ox+5,oy+3,B);P(ox+6,oy+3,B);
  P(ox+1,oy+4,B);[2,3,4,5].forEach(i=>P(ox+i,oy+4,F));P(ox+6,oy+4,B);
  P(ox+1,oy+5,B);[2,3,4,5].forEach(i=>P(ox+i,oy+5,'#87CEEB'));P(ox+6,oy+5,B);
  [2,3,4,5].forEach(i=>P(ox+i,oy+6,B));
  P(ox+2,oy+7,B);P(ox+5,oy+7,B);
  P(ox+7,oy+4,B);P(ox+7,oy+5,B);P(ox+8,oy+5,B);
}

function drGrave(){
  CL();const ox=4,oy=4;
  [2,3,4].forEach(i=>{P(ox+i,oy,B);});
  for(let r=1;r<=4;r++){P(ox+1,oy+r,B);P(ox+5,oy+r,B);}
  for(let r=1;r<=4;r++)for(let c=2;c<=4;c++)P(ox+c,oy+r,'#888');
  P(ox+3,oy+1,B);P(ox+2,oy+2,B);P(ox+3,oy+2,B);P(ox+4,oy+2,B);P(ox+3,oy+3,B);
  for(let i=0;i<8;i++)P(ox+i,oy+5,'#654321');
  P(ox+7,oy+1,W);P(ox+7,oy+2,W);P(ox+6,oy+2,W);P(ox+8,oy+2,W);
}

// =======================================================================
//  DATA
// =======================================================================
const CH={
  egg:{n:'たまご',s:0,d:drEgg},b1:{n:'まるべび',s:1,d:drBaby1},b2:{n:'くろべび',s:1,d:drBaby2},
  c1:{n:'まるっち',s:2,d:drMarutchi},c2:{n:'とんがり',s:2,d:drTongaritchi},c3:{n:'くちぱっち',s:2,d:drKuchitchi},
  a1:{n:'まめっち',s:3,d:drMametchi},a2:{n:'ぎんじろ',s:3,d:drGinjiro},
  a3:{n:'くちたま',s:3,d:drKuchiTama},a4:{n:'ますくっち',s:3,d:drMaskutchi},
  se:{n:'おやじっち',s:4,d:drOyajitchi},de:{n:'おはか',s:-1,d:drGrave},
};

const C={MAX:4,TK:6000,AT:25000,SH:21,WH:7,DM:5,GR:5,EV:[12,45,85,170]};

let S={
  c:CH.egg,hu:3,ha:3,di:0,wt:5,po:0,si:false,sl:false,li:true,
  at:false,aT:null,aS:0,mi:0,ag:0,tk:0,ev:0,de:false,
  ov:null,ic:-1,af:0,gd:{w:0,r:0,a:null},
};

// =======================================================================
//  BEEP
// =======================================================================
let ax;function bp(f=800,d=50){try{if(!ax)ax=new(window.AudioContext||window.webkitAudioContext)();const o=ax.createOscillator(),g=ax.createGain();o.type='square';o.frequency.value=f;g.gain.value=0.04;o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+d/1000);}catch(e){}}

// =======================================================================
//  RENDER
// =======================================================================
function R(){
  const scr=document.getElementById('scr');
  scr.classList.toggle('night',S.sl||!S.li);

  if(S.de)drGrave();else S.c.d(S.af);

  const cl=cv.classList;
  cl.remove('a-walk','a-boing','a-wob','a-bob','a-none');
  if(S.de)cl.add('a-none');
  else if(S.sl)cl.add('a-bob');
  else if(S.si)cl.add('a-wob');
  else if(S.c.s===0)cl.add('a-wob');
  else cl.add('a-walk');

  document.getElementById('zzz').style.display=(S.sl&&!S.de)?'block':'none';
  const po=document.getElementById('poo');
  po.style.display=(S.po>0&&!S.de)?'block':'none';
  po.textContent='💩'.repeat(Math.min(S.po,3));

  document.querySelectorAll('.ic').forEach((el,i)=>el.classList.toggle('sel',S.ic===i));

  document.getElementById('ov-f').classList.toggle('show',S.ov==='f');
  document.getElementById('ov-g').classList.toggle('show',S.ov==='g');
  document.getElementById('ov-h').classList.toggle('show',S.ov==='h');
}

// =======================================================================
//  CONTROLS
// =======================================================================
function tap(i){if(S.de||S.ov)return;if(S.ic===i){ex(i);S.ic=-1;}else S.ic=i;bp(600,20);R();}
function pA(){bp(600,20);if(S.ov)return;S.ic=(S.ic+1)%8;R();}
function pB(){bp(800,20);if(S.ov)return;if(S.ic>=0){ex(S.ic);S.ic=-1;R();}}
function pC(){bp(400,20);if(S.ov){xOv();return;}S.ic=-1;R();}

function ex(i){
  if(S.de)return;
  switch(i){
    case 0:if(S.c.s===0||S.sl)return;S.ov='f';R();break;
    case 1:S.li=!S.li;if(S.sl&&!S.li&&S.at&&S.aT==='li'){S.at=false;S.aT=null;}R();break;
    case 2:if(S.c.s===0||S.sl||S.si||S.hu===0)return;S.ov='g';S.gd={w:0,r:0,a:null};gN();R();break;
    case 3:if(S.sl||!S.si)return;S.si=false;if(S.at&&S.aT==='si'){S.at=false;S.aT=null;}bp(1200,80);R();break;
    case 4:if(S.sl||S.po===0)return;S.po=0;if(S.at&&S.aT==='po'){S.at=false;S.aT=null;}R();break;
    case 5:oHP();break;
    case 6:if(S.sl)return;if(S.at&&S.aT==='ta'){S.di=Math.min(C.MAX,S.di+1);S.at=false;S.aT=null;bp(1200,80);}R();break;
    case 7:R();break;
  }
}

function xOv(){S.ov=null;R();}

function doFeed(t){
  S.ov=null;if(S.si){R();return;}
  if(t==='m'){if(S.hu>=C.MAX){R();return;}S.hu=Math.min(C.MAX,S.hu+1);S.wt=Math.min(35,S.wt+1);}
  else{if(S.ha>=C.MAX){R();return;}S.ha=Math.min(C.MAX,S.ha+1);S.wt=Math.min(35,S.wt+2);}
  if(S.at&&(S.aT==='hu'||S.aT==='un')){S.at=false;S.aT=null;}
  bp(1000,50);cv.classList.remove('a-walk');cv.classList.add('a-boing');
  setTimeout(()=>{cv.classList.remove('a-boing');R();},1500);R();
}

function gN(){if(S.gd.r>=C.GR){gE();return;}S.gd.a=Math.random()<.5?'L':'R';document.getElementById('gd').textContent=S.gd.a==='L'?'👈':'👉';document.getElementById('g-sc').textContent=S.gd.w+'/'+S.gd.r;document.getElementById('gl').className='gb';document.getElementById('gr2').className='gb';}
function gA(c){if(S.ov!=='g'||S.gd.r>=C.GR)return;S.gd.r++;if(c===S.gd.a){S.gd.w++;document.getElementById(c==='L'?'gl':'gr2').classList.add('ok');bp(1200,30);}else{document.getElementById(c==='L'?'gl':'gr2').classList.add('ng');bp(300,50);}document.getElementById('g-sc').textContent=S.gd.w+'/'+S.gd.r;setTimeout(gN,500);}
function gE(){S.ov=null;if(S.gd.w>=3)S.ha=Math.min(C.MAX,S.ha+1);S.hu=Math.max(0,S.hu-1);if(S.at&&S.aT==='un'){S.at=false;S.aT=null;}R();}

function oHP(){
  S.ov='h';const h=(v,m)=>{let s='';for(let i=0;i<m;i++)s+=i<v?'♥':'♡';return s;};
  document.getElementById('hn').textContent=S.c.n;
  document.getElementById('ha').textContent=S.ag+'さい';
  document.getElementById('hw').textContent=S.wt+'g';
  document.getElementById('hh').textContent=h(S.hu,C.MAX);
  document.getElementById('hp2').textContent=h(S.ha,C.MAX);
  document.getElementById('hd').textContent=h(S.di,C.MAX);
  R();
}

// =======================================================================
//  EVOLUTION
// =======================================================================
function evo(){
  const st=S.c.s;
  if(st===0)return Math.random()<.5?CH.b1:CH.b2;
  if(st===1){const r=Math.random();return r<.4?CH.c1:r<.7?CH.c2:CH.c3;}
  if(st===2){const sc=S.hu+S.ha+S.di-(S.mi*2);if(sc>=8)return CH.a1;if(sc>=4)return CH.a2;if(sc>=0)return CH.a3;return CH.a4;}
  if(st===3&&S.di>=C.MAX&&S.mi===0)return CH.se;
  return null;
}
function cEvo(){
  const th=C.EV[S.c.s]||9999;if(S.ev<th)return;
  const t=evo();if(!t){S.ev=0;return;}
  bp(600,60);setTimeout(()=>bp(800,60),120);setTimeout(()=>bp(1000,60),240);setTimeout(()=>bp(1200,120),360);
  let fl=0;const iv=setInterval(()=>{CL();if(fl%2===0)for(let y=0;y<16;y++)for(let x=0;x<16;x++)if((x+y+fl)%3===0)P(x,y,B);fl++;if(fl>10){clearInterval(iv);S.c=t;S.ev=0;if(t.s===1){S.wt=8;S.hu=3;S.ha=3;}R();}},140);
}

// =======================================================================
//  TICK
// =======================================================================
function tick(){
  if(S.de){R();return;}
  const h=new Date().getHours(),sl=h>=C.SH||h<C.WH;
  if(sl&&!S.sl)S.sl=true;if(!sl&&S.sl){S.sl=false;S.li=true;}
  if(S.c.s===0){S.ev++;cEvo();R();return;}
  if(!S.sl){if(Math.random()<.50)S.hu=Math.max(0,S.hu-1);if(Math.random()<.35)S.ha=Math.max(0,S.ha-1);}
  else if(Math.random()<.15)S.hu=Math.max(0,S.hu-1);
  if(Math.random()<(S.sl?.10:.25)&&S.po<4)S.po++;
  if(!S.si){let p=.03+S.po*.08;if(S.hu===0)p+=.12;if(Math.random()<p)S.si=true;}
  else if(Math.random()<.12)S.mi++;
  if(S.hu===0&&S.wt>5&&Math.random()<.25)S.wt--;
  S.tk++;S.ev++;if(S.tk%90===0)S.ag++;
  if(S.mi>=C.DM){S.de=true;S.c=CH.de;R();return;}
  if(!S.at){
    if(S.sl&&S.li)sA('li');
    else if(!S.sl){if(S.si)sA('si');else if(S.po>=2)sA('po');else if(S.hu===0)sA('hu');else if(S.ha===0)sA('un');else if(Math.random()<.05&&S.hu>=C.MAX&&S.ha>=C.MAX)sA('ta');}
  }
  if(S.at&&Date.now()-S.aS>=C.AT){S.mi++;S.at=false;S.aT=null;}
  cEvo();R();
}
function sA(t){S.at=true;S.aT=t;S.aS=Date.now();bp(500,80);}

// =======================================================================
//  INIT
// =======================================================================
setInterval(()=>{S.af=1-S.af;R();},500);
setInterval(tick,C.TK);
R();
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')pA();if(e.key==='ArrowDown'||e.key==='Enter'||e.key==='s')pB();if(e.key==='ArrowRight'||e.key==='Escape'||e.key==='d')pC();});
</script>
</body>
</html>
